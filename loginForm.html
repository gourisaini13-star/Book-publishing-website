<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Web Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <style>
        .container-login {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block; 
        }   
        .input-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;            
        }   

            button:hover {
                background-color: #0056b3;
            }
            button#google-sign-in {
                background-color: #DB4437;
                margin-top: 10px;
            }
            button#google-sign-in:hover {
                background-color: #a33224;
            }
            button#facebook-sign-in {
                background-color: #3B5998;  
                margin-top: 10px;
            }
            button#facebook-sign-in:hover {
                background-color: #2d4373;
            }   

      

    </style>
</head>

<body>
   <div class="container-login" id="signup">
    <h1 class="form-title">Register</h1>
    <form method="POST" action="register.php">
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="button" id="create-account">
            Create New Account
        </button>
        <p>Already have an account? <a href="login.html">Login here</a></p>
        <button type="submit">Sign Up</button>
        <button type="button" id="google-sign-in">
            <i class="fab fa-google"></i> Sign in with Google
        </button>

         <button type="button" id="facebook-sign-in">
            <i class="fab fa-facebook"></i> Sign in with Facebook
        </button>
    </form>
   </div>
   <script>
    document.querySelector('form').addEventListener('submit', function(event) {
    event.preventDefault();
    alert('Form submission functionality is not implemented yet.');
});
    
   </script>

    <script src="script.js"></script>
</body>

</html>
